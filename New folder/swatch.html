<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Swatch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Minimalist & Compact Layout */
        @import url('https://fonts.googleapis.com/css2?family=Sansita:wght@400;700;800;900&family=Trocchi&display=swap');
        
        body {
            background-color: #f0e2e1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Sansita', sans-serif;
            margin: 0;
            color: #4A4447;
        }

        .swatch-container {
            width: 100%;
            max-width: 420px;
            background: #f0e2e1;
            border: 2px solid #5a174c;
            border-radius: 10px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 4px 4px 0px #5a174c;
            position: relative;
        }

        h3 {
            font-family: 'Sansita', sans-serif;
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #4A4447;
        }

        .project-label { font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        
        .unit-toggle-wrapper {
            position: absolute; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600;
        }

        .toggle-switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #eee; transition: .3s; border-radius: 18px;
        }

        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px;
            background-color: white; transition: .3s; border-radius: 50%;
        }

        input:checked + .slider { background-color: #5a174c; }
        input:checked + .slider:before { transform: translateX(18px); }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }

        .input-group label {
            font-family: 'Sansita', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            color: #4A4447;
            text-transform: uppercase;
        }

        .input-group input {
            height: 36px;
            border: none;
            border-bottom: 2px solid #5a174c;
            font-size: 1rem;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            font-family: 'Trocchi', serif;
            color: #4A4447;
        }

        .input-group input:focus {
            outline: none;
            background-color: #d6aec6;
        }

        .input-group input[readonly] { background-color: #f0e2e1; font-weight: 600; color: #000; }
        .divider { grid-column: span 2; height: 1px; margin: 5px 0; }
        .section-label { grid-column: span 2; font-size: 0.75rem; font-weight: 600; margin-bottom: -5px; }

        .button-row { display: flex; gap: 10px; margin-top: 10px; }

        .action-btn {
            flex: 1;
            padding: 10px;
            background: #5a174c;
            color: #f0e2e1;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Sansita', sans-serif;
            text-transform: uppercase;
            box-shadow: none !important;
            text-shadow: none !important;
            border: none;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #d6aec6;
            color: #4A4447;
        }

        .home-link {
            text-align: center;
            font-size: 0.8rem;
            color: #4A4447;
            text-decoration: none;
            margin-top: 5px;
            cursor: pointer;
            font-family: 'Sansita', sans-serif;
        }
    </style>
</head>

<body>
    <div class="swatch-container">
        <h3>Project Swatch</h3>
        <div id="projectName" class="project-label">Loading...</div>
        
        <div class="unit-toggle-wrapper">
            <span>CM</span>
            <label class="toggle-switch">
                <input type="checkbox" id="unitToggle">
                <span class="slider"></span>
            </label>
            <span>IN</span>
        </div>

        <div class="input-grid">
            <div class="input-group"><label>Stitches</label><input type="number" id="swatchSts"></div>
            <div class="input-group"><label>Rows</label><input type="number" id="swatchRows"></div>
            <div class="input-group"><label class="unit-label">Width</label><input type="number" id="swatchWidth"></div>
            <div class="input-group"><label class="unit-label">Height</label><input type="number" id="swatchHeight"></div>
            
            <div class="divider"></div>
            <div class="section-label">Target Size</div>
            
            <div class="input-group"><label>Req. Width</label><input type="number" id="reqWidth"></div>
            <div class="input-group"><label>Req. Height</label><input type="number" id="reqHeight"></div>
            
            <div class="section-label">Results</div>
            <div class="input-group"><input type="text" id="resultSts" readonly></div>
            <div class="input-group"><input type="text" id="resultRows" readonly></div>
        </div>

        <div class="button-row">
            <button class="action-btn" id="copySpecsBtn">Copy Swatch to Notes</button>
            <button class="action-btn" id="copyResultsBtn">Copy Results to Notes</button>
        </div>
        <a class="home-link" onclick="window.location.href='project.html'">Back to Project</a>
    </div>

<script type="module">
    import { supabase } from './supabase-config.js';

    let currentUnit = "cm"; 
    let currentUser = null;
    let currentProjectId = localStorage.getItem("currentProjectId");
    
    document.addEventListener("DOMContentLoaded", async function() {
        // 1. Get current user
        const { data: { user } } = await supabase.auth.getUser();
        currentUser = user;

        const tempData = JSON.parse(localStorage.getItem("tempProjectData"));

        // 2. Load from Supabase
        if (currentProjectId && currentUser) {
            const { data: project, error } = await supabase
                .from('projects')
                .select('name, swatchsts, swatchrow, swatchwidth, swatchlength')
                .eq('id', currentProjectId)
                .single();

            if (project && !error) {
                document.getElementById("projectName").innerText = project.name || "Project Swatch";
                document.getElementById("swatchSts").value = project.swatchsts || "";
                document.getElementById("swatchRows").value = project.swatchrow || "";
                document.getElementById("swatchWidth").value = project.swatchwidth || "";
                document.getElementById("swatchHeight").value = project.swatchlength || "";
                runMath();
            }
        } 
        else if (tempData) {
            document.getElementById("projectName").innerText = (tempData.name || "Untitled") + " (Draft)";
            if (tempData.swatch) loadData(tempData.swatch);
        }

        initListeners();
    });

    function loadData(data) {
        document.getElementById("swatchSts").value = data.sts || "";
        document.getElementById("swatchRows").value = data.rows || "";
        document.getElementById("swatchWidth").value = data.sWidth || "";
        document.getElementById("swatchHeight").value = data.sHeight || "";
        document.getElementById("reqWidth").value = data.rWidth || "";
        document.getElementById("reqHeight").value = data.rHeight || "";
        
        if (data.unit === "inches") {
            document.getElementById("unitToggle").checked = true;
            currentUnit = "inches";
            updateLabels();
        }
        runMath();
    }

    function updateLabels() {
        const labels = document.querySelectorAll(".unit-label");
        labels[0].innerText = currentUnit === "cm" ? "Width (cm)" : "Width (in)";
        labels[1].innerText = currentUnit === "cm" ? "Height (cm)" : "Height (in)";
    }

    function runMath() {
        const sts = parseFloat(document.getElementById("swatchSts").value) || 0;
        const rows = parseFloat(document.getElementById("swatchRows").value) || 0;
        const sWidth = parseFloat(document.getElementById("swatchWidth").value) || 0;
        const sHeight = parseFloat(document.getElementById("swatchHeight").value) || 0;
        const rWidth = parseFloat(document.getElementById("reqWidth").value) || 0;
        const rHeight = parseFloat(document.getElementById("reqHeight").value) || 0;

        if (sts > 0 && sWidth > 0 && rWidth > 0) {
            document.getElementById("resultSts").value = Math.round((sts / sWidth) * rWidth) + " Sts";
        } else { document.getElementById("resultSts").value = ""; }

        if (rows > 0 && sHeight > 0 && rHeight > 0) {
            document.getElementById("resultRows").value = Math.round((rows / sHeight) * rHeight) + " Rows";
        } else { document.getElementById("resultRows").value = ""; }
    }

    async function autoSave() {
        runMath();
        const swatchData = {
            sts: document.getElementById("swatchSts").value,
            rows: document.getElementById("swatchRows").value,
            sWidth: document.getElementById("swatchWidth").value,
            sHeight: document.getElementById("swatchHeight").value,
            rWidth: document.getElementById("reqWidth").value,
            rHeight: document.getElementById("reqHeight").value,
            unit: currentUnit
        };

        if (currentProjectId && currentUser) {
            await supabase
                .from('projects')
                .update({
                    swatchsts: swatchData.sts || null,
                    swatchrow: swatchData.rows || null,
                    swatchwidth: swatchData.sWidth || null,
                    swatchlength: swatchData.sHeight || null
                })
                .eq('id', currentProjectId)
                .eq('user_id', currentUser.id);
        } else {
            let tempData = JSON.parse(localStorage.getItem("tempProjectData")) || {};
            tempData.swatch = swatchData;
            localStorage.setItem("tempProjectData", JSON.stringify(tempData));
        }
    }

    // UI Copy Logic
    function copySpecs(btn) {
        const sts = document.getElementById("swatchSts").value;
        const rows = document.getElementById("swatchRows").value;
        const w = document.getElementById("swatchWidth").value;
        const h = document.getElementById("swatchHeight").value;
        if (!sts || !w) return;
        const text = `Swatch: ${sts} sts x ${rows} rows = ${w}${currentUnit} x ${h}${currentUnit}`;
        passToProject(text, btn);
    }

    function copyResults(btn) {
        const sts = document.getElementById("resultSts").value;
        const rows = document.getElementById("resultRows").value;
        const w = document.getElementById("reqWidth").value;
        const h = document.getElementById("reqHeight").value;
        if(!sts && !rows) return;
        let text = "";
        if (sts) text += `${w}${currentUnit} length: ${sts}\n`;
        if (rows) text += `${h}${currentUnit} height:  ${rows}`;
        passToProject(text, btn);
    }

    function passToProject(text, btn) {
        const existing = localStorage.getItem("incomingSwatchData") || "";
        const combined = existing + (existing ? "\n\n" : "") + text;
        localStorage.setItem("incomingSwatchData", combined);
        
        const origText = btn.innerText;
        btn.innerText = "ADDED!";
        btn.style.backgroundColor = "#d6aec6";
        btn.style.color = "#5a174c";
        setTimeout(() => {
            btn.innerText = origText;
            btn.style.backgroundColor = "";
            btn.style.color = "";
        }, 1500);
    }

    // Initialize Event Listeners within Module
    function initListeners() {
        // Unit Toggle
        document.getElementById("unitToggle").addEventListener("change", function() {
            currentUnit = this.checked ? "inches" : "cm";
            updateLabels();
            autoSave();
        });

        // Numeric Inputs
        const inputs = document.querySelectorAll("input[type='number']");
        inputs.forEach(input => {
            input.addEventListener("input", autoSave);
        });

        // Buttons
        document.getElementById("copySpecsBtn").addEventListener("click", function() {
            copySpecs(this);
        });
        document.getElementById("copyResultsBtn").addEventListener("click", function() {
            copyResults(this);
        });
    }
</script>
</body>
</html>
